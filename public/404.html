<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Pagina non trovata | Frasma</title>
    <meta http-equiv="refresh" content="0;url=/404" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Geist:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Geist, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1b1916;
        background-color: #f1eada;
        background-image:
          radial-gradient(ellipse 1200px 600px at 20% -5%, rgba(255, 255, 255, 0.55), transparent 70%),
          radial-gradient(circle at 85% 90%, rgba(168, 65, 43, 0.05), transparent 50%);
      }

      .card {
        width: min(100%, 34rem);
        text-align: center;
      }

      .logo {
        width: 6rem;
        height: 6rem;
        border-radius: 9999px;
        object-fit: cover;
        margin: 0 auto 2rem;
        display: block;
        box-shadow:
          0 18px 40px -12px rgba(27, 25, 22, 0.28),
          0 0 0 1px rgba(27, 25, 22, 0.08);
        animation: sprout 2.8s ease-in-out infinite;
      }

      .kicker {
        margin: 0 0 0.75rem;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #a8412b;
      }

      h1 {
        margin: 0 0 1rem;
        font-family: Newsreader, "Times New Roman", serif;
        font-size: clamp(34px, 6vw, 48px);
        line-height: 1.04;
        letter-spacing: -0.022em;
        font-weight: 400;
      }

      p {
        margin: 0 auto 2rem;
        max-width: 36ch;
        font-size: 17px;
        line-height: 1.6;
        color: #6a6357;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        padding: 10px 18px;
        font-size: 13.5px;
        font-weight: 500;
        text-decoration: none;
        transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      }

      .btn-primary {
        background: #1b1916;
        border: 1px solid #1b1916;
        color: #f1eada;
      }

      .btn-primary:hover {
        background: #a8412b;
        border-color: #a8412b;
      }

      .btn-secondary {
        background: transparent;
        border: 1px solid #1b1916;
        color: #1b1916;
      }

      .btn-secondary:hover {
        background: #1b1916;
        color: #f1eada;
      }

      @keyframes sprout {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-3px) scale(1.08);
        }
      }
    </style>
    <script>
      (function () {
        var target = "/404";
        var current = window.location.pathname;
        if (current !== target) {
          window.location.replace(target);
        }
      })();
    </script>
  </head>
  <body>
    <main class="card">
      <img class="logo" src="/logo-frasma.png" alt="Frasma" width="96" height="96" />
      <p class="kicker">404</p>
      <h1>Questa pagina non esiste</h1>
      <p>
        Il link potrebbe essere errato o la pagina essere stata spostata. Puoi tornare alla home
        oppure chiedere aiuto nella chat.
      </p>
      <div class="actions">
        <a class="btn btn-primary" href="/">Torna alla home</a>
        <a class="btn btn-secondary" href="/404">Apri la chat</a>
      </div>
    </main>
  </body>
</html>
